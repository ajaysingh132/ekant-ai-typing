<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekaant AI PRO</title>

<style>
body{background:#0a0a0a;color:#fff;font-family:sans-serif;padding:10px;}
textarea{width:100%;height:120px;margin-top:8px;padding:10px;}
button{padding:10px;margin:5px;background:#C9A84C;border:none;font-weight:bold;}
.card{background:#111;padding:10px;border-radius:10px;margin-bottom:10px;}
</style>
</head>

<body>

<h2>🚀 Ekaant AI PRO</h2>

<!-- IMAGE OCR -->
<div class="card">
<input type="file" accept="image/*" onchange="autoOCR(event)">
<div id="status"></div>

<textarea id="img"></textarea>

<button onclick="cleanAI()">✨ Clean Text</button>
<button onclick="makeSummary()">🧠 Summary</button>
<button onclick="copyText()">📋 Copy</button>
<button onclick="downloadTXT()">⬇ TXT</button>
<button onclick="downloadPDF()">⬇ PDF</button>
</div>

<!-- SUMMARY -->
<div class="card">
<h3>📌 Summary</h3>
<textarea id="summary"></textarea>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// OCR
function autoOCR(e){
 let file=e.target.files[0];
 if(!file)return;

 let status=document.getElementById("status");
 status.innerText="Processing...";

 Tesseract.recognize(file,'eng+hin').then(r=>{
   document.getElementById("img").value=r.data.text;
   status.innerText="Done ✅";
 });
}

// ✨ CLEAN AI (basic smart)
function cleanAI(){
 let t=document.getElementById("img").value;

 t=t.replace(/\n+/g," ")
     .replace(/\s+/g," ")
     .replace(/([।.!?])\s*/g,"$1\n")
     .trim();

 document.getElementById("img").value=t;
}

// 🧠 SUMMARY
function makeSummary(){
 let t=document.getElementById("img").value;

 let sentences=t.split(/[।.!?]/).slice(0,5).join("। ");
 document.getElementById("summary").value=sentences;
}

// 📋 COPY
function copyText(){
 let t=document.getElementById("img");
 t.select();
 document.execCommand("copy");
 alert("Copied");
}

// ⬇ TXT
function downloadTXT(){
 let text=document.getElementById("img").value;
 let blob=new Blob([text],{type:"text/plain"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="text.txt";
 a.click();
}

// ⬇ PDF
function downloadPDF(){
 const { jsPDF } = window.jspdf;
 let doc=new jsPDF();

 let text=document.getElementById("img").value;
 doc.text(text,10,10);

 doc.save("text.pdf");
}

</script>

</body>
</html>
