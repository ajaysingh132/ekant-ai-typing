<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekaant AI Typing</title>

<style>
:root{
  --bg:#0a0a0a;
  --text:#fff;
  --box:#111;
}
.light{
  --bg:#f5f5f5;
  --text:#000;
  --box:#fff;
}

body{
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:15px;
  transition:.3s;
}

button{
  padding:10px 15px;
  margin:6px;
  border:none;
  border-radius:6px;
  background:#C9A84C;
  font-weight:bold;
}

textarea{
  width:100%;
  height:120px;
  margin-top:8px;
  padding:10px;
  background:var(--box);
  color:var(--text);
  border:1px solid #333;
}

.card{
  margin-bottom:20px;
  padding:10px;
  border:1px solid #333;
  border-radius:8px;
}

.history{
  max-height:150px;
  overflow:auto;
  font-size:12px;
  border:1px solid #333;
  padding:8px;
}
</style>
</head>

<body>

<h2>🚀 Ekaant AI Typing</h2>

<button onclick="toggleTheme()">🌗 Theme बदलें</button>

<!-- VOICE -->
<div class="card">
<h3>🎤 Voice</h3>
<button onclick="startMic()">Start</button>
<textarea id="voice"></textarea>
<button onclick="saveData('voice')">💾 Save</button>
</div>

<!-- IMAGE -->
<div class="card">
<h3>📷 Image OCR</h3>
<input type="file" id="imgInput">
<button onclick="processImage()">Extract</button>
<textarea id="img"></textarea>
<button onclick="saveData('img')">💾 Save</button>
</div>

<!-- PDF -->
<div class="card">
<h3>📄 PDF</h3>
<input type="file" id="pdfInput">
<button onclick="processPDF()">Extract</button>
<textarea id="pdf"></textarea>
<button onclick="saveData('pdf')">💾 Save</button>
</div>

<!-- HISTORY -->
<div class="card">
<h3>🕘 History (Offline)</h3>
<div class="history" id="history"></div>
<button onclick="clearHistory()">🗑 Clear</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>

// 🎤 MIC
function startMic(){
  const rec = new (window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang="hi-IN";
  rec.start();
  rec.onresult=e=>{
    document.getElementById("voice").value+=e.results[0][0].transcript+" ";
  }
}

// 📷 IMAGE
function processImage(){
  let file=document.getElementById("imgInput").files[0];
  if(!file) return alert("Image select करें");

  Tesseract.recognize(file,'eng+hin')
  .then(r=>{
    document.getElementById("img").value=r.data.text;
  });
}

// 📄 PDF
async function processPDF(){
  let file=document.getElementById("pdfInput").files[0];
  if(!file) return alert("PDF select करें");

  let reader=new FileReader();
  reader.onload=async function(){
    let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    let text="";
    for(let i=1;i<=pdf.numPages;i++){
      let page=await pdf.getPage(i);
      let c=await page.getTextContent();
      c.items.forEach(it=>text+=it.str+" ");
    }
    document.getElementById("pdf").value=text;
  }
  reader.readAsArrayBuffer(file);
}

// 💾 SAVE HISTORY
function saveData(type){
  let data=document.getElementById(type).value;
  if(!data) return;

  let history=JSON.parse(localStorage.getItem("history")||"[]");
  history.unshift({type,data,time:new Date().toLocaleString()});

  localStorage.setItem("history",JSON.stringify(history));
  loadHistory();
}

// 📜 LOAD HISTORY
function loadHistory(){
  let history=JSON.parse(localStorage.getItem("history")||"[]");
  let html="";
  history.forEach((h,i)=>{
    html+=`<div onclick="loadItem(${i})">
    [${h.type}] ${h.time}<br>
    ${h.data.substring(0,50)}...
    <hr></div>`;
  });
  document.getElementById("history").innerHTML=html;
}

// 🔁 LOAD ITEM
function loadItem(i){
  let history=JSON.parse(localStorage.getItem("history"));
  alert(history[i].data);
}

// 🗑 CLEAR
function clearHistory(){
  localStorage.removeItem("history");
  loadHistory();
}

// 🌗 THEME
function toggleTheme(){
  document.body.classList.toggle("light");
}

loadHistory();

</script>

</body>
  </html>
